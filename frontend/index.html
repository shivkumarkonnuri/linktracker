<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f8fafc; }
    p.sub { font-size: 0.875rem; color: #94a3b8; margin-bottom: 1.5rem; }

    input[type="url"] {
      width: 100%;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
      outline: none;
    }
    input[type="url"]:focus { border-color: #6366f1; }

    button {
      width: 100%;
      padding: 0.65rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #4f46e5; }
    button:disabled { background: #475569; cursor: not-allowed; }

    .result {
      margin-top: 1.25rem;
      padding: 1rem;
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid #334155;
      display: none;
    }
    .result.show { display: block; }

    .result label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .result a {
      display: block;
      margin-top: 0.25rem;
      color: #818cf8;
      word-break: break-all;
      font-size: 0.95rem;
    }

    .copy-btn {
      width: auto;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      background: #334155;
    }
    .copy-btn:hover { background: #475569; }

    .error {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #450a0a;
      border: 1px solid #991b1b;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.875rem;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔗 LinkTracker</h1>
    <p class="sub">Shorten any URL and track clicks in real time.</p>

    <input type="url" id="urlInput" placeholder="https://example.com/very/long/url" />
    <button id="shortenBtn" onclick="shortenURL()">Shorten</button>

    <div class="error" id="errorBox"></div>

    <div class="result" id="resultBox">
      <label>Your short link</label>
      <a id="shortLink" href="#" target="_blank"></a>
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <script>
    const API_BASE = "/api";  // proxied by Nginx to backend:8000

    async function shortenURL() {
      const input   = document.getElementById("urlInput");
      const btn     = document.getElementById("shortenBtn");
      const errorBox  = document.getElementById("errorBox");
      const resultBox = document.getElementById("resultBox");

      const url = input.value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.textContent = "Shortening...";
      errorBox.classList.remove("show");
      resultBox.classList.remove("show");

      try {
        const res = await fetch(`${API_BASE}/shorten`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Something went wrong");
        }

        const data = await res.json();
        const link = document.getElementById("shortLink");
        link.href = data.short_url;
        link.textContent = data.short_url;
        resultBox.classList.add("show");

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("show");
      } finally {
        btn.disabled = false;
        btn.textContent = "Shorten";
      }
    }

    function copyLink() {
      const link = document.getElementById("shortLink").textContent;
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      });
    }

    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") shortenURL();
    });
  </script>
</body>
</html>
