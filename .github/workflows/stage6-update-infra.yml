name: Stage 6 — Update Infra Repo (triggers ArgoCD)

on:
  workflow_call:
    secrets:
      INFRA_REPO_PAT:
        required: true

jobs:
  update-infra:
    name: Bump image tags in linktracker-infra
    runs-on: ubuntu-latest

    steps:
      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: shivkumarkonnuri/linktracker-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: linktracker-infra

      - name: Bump image tags in values-prod.yaml
        run: |
          cd linktracker-infra
          SHA=${{ steps.vars.outputs.sha_short }}
          sed -i "s|shivkumarkonnuri/linktracker:backend-[a-z0-9]*|shivkumarkonnuri/linktracker:backend-${SHA}|" helm/linktracker/values-prod.yaml
          sed -i "s|shivkumarkonnuri/linktracker:worker-[a-z0-9]*|shivkumarkonnuri/linktracker:worker-${SHA}|" helm/linktracker/values-prod.yaml
          sed -i "s|shivkumarkonnuri/linktracker:frontend-[a-z0-9]*|shivkumarkonnuri/linktracker:frontend-${SHA}|" helm/linktracker/values-prod.yaml

      - name: Commit and push
        run: |
          cd linktracker-infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/linktracker/values-prod.yaml
          git commit -m "chore: bump image tags to ${{ steps.vars.outputs.sha_short }}" || echo "No changes to commit"
          git push origin main
