name: Stage 3 — Image Security Scan

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true

permissions:
  security-events: write

jobs:
  image-security-scan:
    name: Scan Docker Images for CVEs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load images into Docker
        run: |
          docker load --input /tmp/backend.tar
          docker load --input /tmp/worker.tar
          docker load --input /tmp/frontend.tar

      - name: Trivy — scan backend image (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:backend-${{ steps.vars.outputs.sha_short }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          trivyignores: .trivyignore

      - name: Trivy — generate backend SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:backend-${{ steps.vars.outputs.sha_short }}
          severity: CRITICAL,HIGH
          exit-code: 0
          format: sarif
          output: trivy-backend.sarif
          trivyignores: .trivyignore
          skip-setup-trivy: true

      - name: Trivy — scan worker image (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:worker-${{ steps.vars.outputs.sha_short }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          trivyignores: .trivyignore

      - name: Trivy — generate worker SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:worker-${{ steps.vars.outputs.sha_short }}
          severity: CRITICAL,HIGH
          exit-code: 0
          format: sarif
          output: trivy-worker.sarif
          trivyignores: .trivyignore
          skip-setup-trivy: true

      - name: Trivy — scan frontend image (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:frontend-${{ steps.vars.outputs.sha_short }}
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
          trivyignores: .trivyignore

      - name: Trivy — generate frontend SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          scan-type: image
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:frontend-${{ steps.vars.outputs.sha_short }}
          severity: CRITICAL,HIGH
          exit-code: 0
          format: sarif
          output: trivy-frontend.sarif
          trivyignores: .trivyignore
          skip-setup-trivy: true

      - name: Upload backend scan to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend-image

      - name: Upload worker scan to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker-image

      - name: Upload frontend scan to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-image
