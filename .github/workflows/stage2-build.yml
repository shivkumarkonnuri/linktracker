name: Stage 2 - Build Images

on:
  workflow_call:

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:backend-${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=/tmp/backend.tar

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:worker-${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=/tmp/worker.tar

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/linktracker:frontend-${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=/tmp/frontend.tar

      - name: Upload built images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar
          retention-days: 1
