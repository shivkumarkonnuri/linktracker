name: Stage 6 - Deploy to Production (GKE)

on:
  workflow_call:
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      GKE_CLUSTER_NAME:
        required: true
      GKE_CLUSTER_ZONE:
        required: true
      GKE_PROJECT_ID:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy-prod:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with: 
          repository: shivkumarkonnuri/linktracker-infra
          path: linktracker-infra

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud cli
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_ZONE }}
          project_id: ${{ secrets.GKE_PROJECT_ID }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Deploy LinkTracker to GKE via Helm
        run: |
          helm upgrade --install linktracker ./linktracker-infra/helm/linktracker \
            -f ./linktracker-infra/helm/linktracker/values.yaml \
            -f ./linktracker-infra/helm/linktracker/values-prod.yaml \
            --namespace linktracker-prod \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Verify pod health
        run: kubectl get pods -n linktracker-prod

      - name: Verify Gateway status
        run: |
          kubectl get gateway -n linktracker-prod -o wide
          kubectl describe gateway linktracker-gateway -n linktracker-prod 

      - name: Smoke test — backend health check
        run: |
          echo "Waiting for Gateway external IP..."

          for i in {1..60}; do
            GATEWAY_IP=$(kubectl get gateway linktracker-gateway \
              -n linktracker-prod \
              -o jsonpath='{.status.addresses[0].value}' 2>/dev/null)

            if [ -n "$GATEWAY_IP" ]; then
              echo "Gateway IP: $GATEWAY_IP"
              break
            fi

            echo "Gateway not ready yet... waiting 10 seconds"
            sleep 10
          done

          if [ -z "$GATEWAY_IP" ]; then
            echo "Gateway never received an external IP."
            kubectl get gateway -n linktracker-prod
            exit 1
          fi

          echo "Waiting for backend health endpoint..."

          for i in {1..30}; do
            if curl -fs "http://${GATEWAY_IP}/api/health"; then
              echo "Smoke test PASSED ✅"
              exit 0
            fi

            echo "Backend not ready yet..."
            sleep 10
          done

          echo "Smoke test FAILED"
          exit 1
      - name: Verify deployment
        run: |
          kubectl get pods -n linktracker-prod
          kubectl get svc -n linktracker-prod
          kubectl get httproute -n linktracker-prod
          kubectl get gateway -n linktracker-prod
